name: Tests

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306

    env:
      EXTENSIONS_CACHE_KEY: extensions-cache-v1

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v7.0.0

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd, redis, igbinary, msgpack, memcached, gmp, :php-psr

      - name: Install Dependencies
        run: composer install -q --no-interaction

      - name: Prepare Laravel Application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: ./vendor/bin/pest
