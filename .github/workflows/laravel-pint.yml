name: Laravel Pint

on:
  push:
    branches:
      - main

jobs:
  run-laravel-pint:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v7.0.0

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Laravel Pint
        run: composer require laravel/pint

      - name: Run Laravel Pint
        run: ./vendor/bin/pint

      - name: Push Changes Back to Repository
        run: |
          git config user.email "isourav2018@gmail.com"
          git config user.name "Sourav Sarkar"
          git add .
          git commit -m "Pint Fixes" || exit 0
          git push
